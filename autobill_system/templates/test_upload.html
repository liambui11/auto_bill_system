<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Test AI Upload</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">Test Upload Ảnh Nhận Diện</h5>
                </div>
                <div class="card-body">
                    <p class="text-muted small">Lưu ý: Bạn phải nhấn "Bắt đầu hóa đơn" trên Dashboard trước khi test.</p>
                    <form action="/test/upload/" method="post" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label class="form-label">Chọn ảnh sản phẩm</label>
                            <input type="file" name="image" class="form-control" accept="image/*" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Giả lập cân nặng (kg)</label>
                            <input type="number" name="weight" class="form-control" step="0.001" value="0.500">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Upload & Predict</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
